<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solterra — Task Tracker</title><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--surface3:#242424;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8e6e0;--muted:#6b6a66;--green:#6fcf62;--amber:#f5a623;--red:#f04747;--blue:#5b9cf5;--purple:#8b7ff5;--teal:#3ecf8e}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;padding:40px 24px 80px}.header{max-width:860px;margin:0 auto 40px;border-bottom:.5px solid var(--border);padding-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between}.logo h1{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:'DM Mono',monospace}.logo h2{font-size:22px;font-weight:600;letter-spacing:-.02em}.back{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-decoration:none}.back:hover{color:var(--text)}.wrap{max-width:860px;margin:0 auto}.tabs{display:flex;gap:3px;margin-bottom:16px;flex-wrap:wrap}.tab{padding:6px 14px;background:var(--surface);border:.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;white-space:nowrap}.tab:hover{color:var(--text)}.tab.active{background:var(--surface3);color:var(--text);border-color:var(--border2)}.add-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}.add-inp{flex:1;min-width:180px;background:var(--surface);border:.5px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}.add-inp::placeholder{color:var(--muted)}.add-sel{background:var(--surface);border:.5px solid var(--border2);color:var(--muted);padding:8px 10px;border-radius:7px;font-size:11px;font-family:'DM Mono',monospace;outline:none;cursor:pointer}.add-btn{background:var(--green);border:none;color:#000;padding:8px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}.tsec{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin:16px 0 8px;display:flex;align-items:center;gap:8px}.tsec::after{content:'';flex:1;height:.5px;background:var(--border)}.item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--surface);border:.5px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .15s;user-select:none;position:relative;overflow:hidden}.item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}.item.pu::before{background:var(--red)}.item.ph::before{background:var(--amber)}.item.pp::before{background:transparent}.item.profit{border-color:rgba(111,207,98,.25)}.item:hover{border-color:var(--border2)}.item.done{opacity:.35}.item.done .itext{text-decoration:line-through}.ichk{width:18px;height:18px;border-radius:50%;border:.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;transition:all .15s}.item.done .ichk{background:var(--green);border-color:var(--green);color:#000}.ibody{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}.itext{flex:1;font-size:12px;min-width:100px}.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-family:'DM Mono',monospace;white-space:nowrap}.tg{background:rgba(111,207,98,.12);color:var(--green)}.tc{background:rgba(91,156,245,.12);color:var(--blue)}.td{background:rgba(62,207,142,.12);color:var(--teal)}.ts{background:rgba(255,255,255,.07);color:var(--muted)}.tr{background:rgba(240,71,71,.12);color:var(--red)}.ta{background:rgba(245,166,35,.12);color:var(--amber)}.tb{background:rgba(91,156,245,.12);color:var(--blue)}.idel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity .15s;flex-shrink:0}.item:hover .idel{opacity:1}.idel:hover{color:var(--red)}.empty{font-size:12px;color:var(--muted);padding:16px 0;font-style:italic}.footer{max-width:860px;margin:48px auto 0;padding-top:20px;border-top:.5px solid var(--border);font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;justify-content:space-between}</style></head><body><div class="header"><div class="logo"><h1>Solterra Acquisitions LLC</h1><h2>Task Tracker</h2></div><a href="index.html" class="back">← Hub</a></div><div class="wrap"><div class="tabs"><div class="tab active" onclick="setV('daily',this)">Daily</div><div class="tab" onclick="setV('weekly',this)">Weekly</div><div class="tab" onclick="setV('monthly',this)">Monthly</div><div class="tab" onclick="setV('quarterly',this)">Quarterly</div><div class="tab" onclick="setV('yearly',this)">Yearly</div><div class="tab" onclick="setV('longterm',this)">Long Term</div></div><div class="add-row"><input class="add-inp" id="ni" placeholder="Add a task..." onkeydown="if(event.key==='Enter')add()"><select class="add-sel" id="np"><option value="urgent">🔴 Urgent</option><option value="high">🟡 High</option><option value="normal" selected>🔵 Normal</option></select><select class="add-sel" id="nc"><option value="ghl">GHL</option><option value="campaign">Campaign</option><option value="deal">Deal 💰</option><option value="solterra">Solterra</option></select><button class="add-btn" onclick="add()">+ Add</button></div><div id="area"></div></div><div class="footer"><span>Solterra Acquisitions LLC — Task Tracker</span><span>March 2026</span></div><script>let V='daily',NI=100;const catCls={ghl:'tg',campaign:'tc',deal:'td',solterra:'ts'};function load(){try{return JSON.parse(localStorage.getItem('sl_tasks3'))||def();}catch(e){return def();}}function save(){localStorage.setItem('sl_tasks3',JSON.stringify(T));}function def(){return [{id:1,text:'Check GHL for overnight replies and inbound leads',v:'daily',p:'urgent',c:'deal',profit:true,done:false},{id:2,text:'Check A2P SMS registration status',v:'daily',p:'urgent',c:'ghl',profit:false,done:false},{id:3,text:'Run Truelist domain health check on mail.solterrarei.com',v:'daily',p:'high',c:'campaign',profit:false,done:false},{id:4,text:'Call back any missed inbound leads',v:'daily',p:'high',c:'deal',profit:true,done:false},{id:5,text:'Move warm leads forward in GHL pipeline',v:'daily',p:'normal',c:'ghl',profit:true,done:false},{id:6,text:'Pull and clean Lehigh Acres list from PropStream',v:'weekly',p:'urgent',c:'campaign',profit:true,done:false},{id:7,text:'Review campaign open rates and bounce rates',v:'weekly',p:'high',c:'campaign',profit:false,done:false},{id:8,text:'Upload new cleaned list to GHL and launch campaign',v:'weekly',p:'high',c:'ghl',profit:true,done:false},{id:9,text:'Follow up on offers sent but not responded to',v:'weekly',p:'high',c:'deal',profit:true,done:false},{id:10,text:'Add new cash buyers from Facebook groups',v:'weekly',p:'normal',c:'deal',profit:true,done:false},{id:11,text:'Review all active markets — adjust ARVs if needed',v:'monthly',p:'high',c:'solterra',profit:false,done:false},{id:12,text:'Pull new lists for 2-3 markets not yet running campaigns',v:'monthly',p:'high',c:'campaign',profit:true,done:false},{id:13,text:'Clean up GHL pipeline — archive dead leads',v:'monthly',p:'normal',c:'ghl',profit:false,done:false},{id:14,text:'Evaluate campaign performance — kill underperformers',v:'quarterly',p:'high',c:'campaign',profit:true,done:false},{id:15,text:'Update MAO prices for all active markets',v:'quarterly',p:'high',c:'solterra',profit:false,done:false},{id:16,text:'Get A2P SMS fully approved and launch SMS sequences',v:'yearly',p:'urgent',c:'ghl',profit:true,done:false},{id:17,text:'Scale to 5+ deals closed — review what is working',v:'yearly',p:'high',c:'solterra',profit:true,done:false},{id:18,text:'Build systematic buyer pipeline — 50+ cash buyers per market',v:'longterm',p:'high',c:'deal',profit:true,done:false},{id:19,text:'Hire VA for list pulling and GHL management',v:'longterm',p:'normal',c:'solterra',profit:false,done:false},{id:20,text:'Expand to 50+ active markets across Florida',v:'longterm',p:'normal',c:'solterra',profit:true,done:false}];}let T=load();NI=Math.max(...T.map(t=>t.id||0))+1;function setV(v,el){V=v;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}function add(){const text=document.getElementById('ni').value.trim();if(!text)return;const p=document.getElementById('np').value,c=document.getElementById('nc').value;T.push({id:NI++,text,v:V,p,c,profit:c==='deal',done:false});document.getElementById('ni').value='';save();render();}function tog(id){const t=T.find(t=>t.id===id);if(t){t.done=!t.done;save();render();}}function del(id,e){e.stopPropagation();T=T.filter(t=>t.id!==id);save();render();}function iHTML(t){const pc={urgent:'pu',high:'ph',normal:'pp'}[t.p]||'';const cc=catCls[t.c]||'ts';const priTag=t.p==='urgent'?'<span class="tag tr">urgent</span>':t.p==='high'?'<span class="tag ta">high</span>':'';return '<div class="item '+pc+(t.profit?' profit':'')+(t.done?' done':'')+'" onclick="tog('+t.id+')"><div class="ichk">'+(t.done?'✓':'')+'</div><div class="ibody"><span class="itext">'+t.text+(t.profit?' 💰':'')+'</span>'+priTag+'<span class="tag '+cc+'">'+t.c+'</span></div><button class="idel" onclick="del('+t.id+',event)">×</button></div>';}function render(){const all=T.filter(t=>t.v===V);const open=all.filter(t=>!t.done);const done=all.filter(t=>t.done);const po={urgent:0,high:1,normal:2};const profit=open.filter(t=>t.profit).sort((a,b)=>po[a.p]-po[b.p]);const urgent=open.filter(t=>!t.profit&&t.p==='urgent');const high=open.filter(t=>!t.profit&&t.p==='high');const normal=open.filter(t=>!t.profit&&t.p==='normal');let h='';if(profit.length)h+='<div class="tsec" style="color:var(--green)">💰 Priority Money-Making</div>'+profit.map(iHTML).join('');if(urgent.length)h+='<div class="tsec">🔴 Urgent</div>'+urgent.map(iHTML).join('');if(high.length)h+='<div class="tsec">🟡 High</div>'+high.map(iHTML).join('');if(normal.length)h+='<div class="tsec">Normal</div>'+normal.map(iHTML).join('');if(!all.length)h='<div class="empty">No tasks for this timeframe. Add one above.</div>';if(done.length)h+='<div class="tsec" style="margin-top:24px">Completed</div>'+done.map(iHTML).join('');document.getElementById('area').innerHTML=h;}render();</script></body></html>
