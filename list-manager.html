<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solterra — List Manager</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0a0a;--sidebar:#0f0f0f;--surface:#141414;--surface2:#1c1c1c;--surface3:#242424;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8e6e0;--muted:#6b6a66;--dim:#2a2a28;--green:#6fcf62;--amber:#f5a623;--blue:#5b9cf5;--teal:#3ecf8e;--coral:#f57c5b;--purple:#8b7ff5}html,body{height:100%;overflow:hidden}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;display:flex;flex-direction:column}.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:.5px solid var(--border);background:var(--sidebar);height:48px;flex-shrink:0}.tb-logo{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}.tb-sep{width:.5px;height:16px;background:var(--border2)}.tb-title{font-size:14px;font-weight:600}.tb-right{margin-left:auto}.tb-btn{background:var(--surface2);border:.5px solid var(--border2);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;text-decoration:none}.tb-btn:hover{color:var(--text)}.shell{display:flex;flex:1;overflow:hidden}.sidebar{width:220px;background:var(--sidebar);border-right:.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}.sb-hdr{padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}.sb-lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace}.sb-add{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 4px}.sb-add:hover{color:var(--text)}.sb-tree{flex:1;overflow-y:auto;padding:8px 0}.ts{padding:4px 14px}.tsl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;display:flex;align-items:center;gap:6px}.tsl:hover{color:var(--text)}.tc{padding:2px 0 2px 12px}.tcl{font-size:11px;font-weight:500;color:var(--muted);padding:3px 8px;cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:4px}.tcl:hover{background:var(--surface2);color:var(--text)}.tsb{padding:2px 0 2px 12px}.tsi{font-size:12px;padding:5px 10px;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:space-between;gap:6px;color:var(--muted)}.tsi:hover{background:var(--surface2);color:var(--text)}.tsi.active{background:var(--surface3);color:var(--text)}.tsn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tps{display:flex;gap:3px}.tp{width:6px;height:6px;border-radius:50%;background:var(--dim)}.tp.s{background:var(--green)}.tp.c{background:var(--blue)}.tp.i{background:var(--amber)}.tp.r{background:var(--purple)}.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.mhdr{padding:12px 20px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}.bc{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}.bc span{color:var(--text)}.ltabs{display:flex;gap:2px;padding:0 20px;border-bottom:.5px solid var(--border);flex-shrink:0;background:var(--sidebar)}.lt{padding:10px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}.lt:hover{color:var(--text)}.lt.active{color:var(--text);border-bottom-color:var(--text)}.lcontent{flex:1;overflow-y:auto;padding:20px}.uzone{border:1.5px dashed var(--border2);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px}.uzone:hover,.uzone.over{border-color:var(--green);background:rgba(111,207,98,.04)}.uzone input{display:none}.ui{font-size:28px;margin-bottom:10px}.ut{font-size:14px;font-weight:600;margin-bottom:4px}.us{font-size:12px;color:var(--muted)}.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}.sbox{background:var(--surface);border:.5px solid var(--border);border-radius:8px;padding:12px 14px}.sv{font-size:22px;font-weight:600;margin-bottom:2px}.sl{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}.ctrls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}.si{background:var(--surface);border:.5px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:200px}.si::placeholder{color:var(--muted)}.fb{background:var(--surface);border:.5px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;transition:all .15s}.fb:hover,.fb.on{background:var(--surface3);color:var(--text);border-color:var(--border2)}.eb{background:rgba(111,207,98,.1);border:.5px solid rgba(111,207,98,.3);color:var(--green);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;margin-left:auto}.eb:hover{background:rgba(111,207,98,.18)}.dt{width:100%;border-collapse:collapse;font-size:12px}.dt th{text-align:left;padding:8px 10px;border-bottom:.5px solid var(--border2);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-family:'DM Mono',monospace;cursor:pointer}.dt th:hover{color:var(--text)}.dt td{padding:9px 10px;border-bottom:.5px solid var(--border);vertical-align:middle}.dt tr:hover td{background:var(--surface2)}.dt tr:last-child td{border-bottom:none}.sb2{height:4px;border-radius:2px;background:var(--dim);width:60px;display:inline-block;vertical-align:middle;overflow:hidden;margin-right:6px}.sf{height:100%;border-radius:2px}.sp{font-size:10px;padding:2px 8px;border-radius:12px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap}.pg{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-top:8px}.pi{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}.pbs{display:flex;gap:4px}.pb{background:var(--surface);border:.5px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}.pb:hover,.pb.on{background:var(--surface3);color:var(--text)}.ni{background:none;border:none;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;width:140px}.ni:focus{color:var(--text)}.es{text-align:center;padding:60px 20px;color:var(--muted)}.ei{font-size:36px;margin-bottom:12px}.et{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}.esub{font-size:12px;line-height:1.6}.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}.mo.open{display:flex}.md{background:var(--surface);border:.5px solid var(--border2);border-radius:12px;padding:24px;width:380px;max-width:90vw}.mt{font-size:15px;font-weight:600;margin-bottom:16px}.mf{margin-bottom:12px}.ml{font-size:11px;color:var(--muted);margin-bottom:5px;display:block;font-family:'DM Mono',monospace}.mi{width:100%;background:var(--surface2);border:.5px solid var(--border2);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}.mbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}.mcancel{background:none;border:.5px solid var(--border2);color:var(--muted);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px}.mok{background:var(--green);border:none;color:#000;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}.toast{position:fixed;bottom:20px;right:20px;background:var(--surface3);border:.5px solid var(--border2);color:var(--text);padding:10px 16px;border-radius:8px;font-size:12px;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none}.toast.show{opacity:1}</style></head><body><div class="topbar"><span class="tb-logo">Solterra</span><div class="tb-sep"></div><span class="tb-title">List Manager</span><div class="tb-right"><a href="index.html" class="tb-btn">← Hub</a></div></div><div class="shell"><div class="sidebar"><div class="sb-hdr"><span class="sb-lbl">Markets</span><button class="sb-add" onclick="openModal()" title="Add market">+</button></div><div class="sb-tree" id="tree"></div></div><div class="main"><div class="mhdr"><span class="bc" id="bc">Select a market →</span></div><div class="ltabs"><div class="lt active" onclick="switchTab('sellers',this)">Sellers</div><div class="lt" onclick="switchTab('corp',this)">Corp Buyers</div><div class="lt" onclick="switchTab('indv',this)">Indv Buyers</div><div class="lt" onclick="switchTab('realtors',this)">Realtors</div></div><div class="lcontent" id="lc"><div class="es"><div class="ei">📍</div><div class="et">Select a market</div><div class="esub">Choose a market from the sidebar to view and upload list data.</div></div></div></div></div><div class="mo" id="am"><div class="md"><div class="mt">Add Market</div><div class="mf"><label class="ml">State</label><input class="mi" id="ms" placeholder="Florida"></div><div class="mf"><label class="ml">County</label><input class="mi" id="mc" placeholder="Marion County"></div><div class="mf"><label class="ml">Submarket</label><input class="mi" id="mm" placeholder="Rainbow Lakes Estates"></div><div class="mbtns"><button class="mcancel" onclick="closeModal()">Cancel</button><button class="mok" onclick="addMarket()">Add</button></div></div></div><div class="toast" id="toast"></div><script>const PS=25;let S={markets:loadM(),active:null,tab:'sellers',data:{},notes:{},statuses:{},page:0,search:'',filter:'all',sort:{col:null,dir:'desc'}};function key(s,c,m,t){return[s,c,m,t].join('|');}function aKey(){if(!S.active)return null;return key(S.active.s,S.active.c,S.active.m,S.tab);}function loadM(){try{return JSON.parse(localStorage.getItem('sl_mkts'))||defM();}catch(e){return defM();}}function saveM(){localStorage.setItem('sl_mkts',JSON.stringify(S.markets));}function defM(){return{'Florida':{'Marion County':['Rainbow Lakes Estates','Marion Oaks','Rainbow Park','Silver Spring Shores','East Silver Spring Shores'],'Lee County':['Cape Coral','Lehigh Acres'],'Sarasota County':['North Port','Englewood'],'Charlotte County':['South Gulf Cove','Rotonda West'],'Brevard County':['Palm Bay'],'Citrus County':['Beverly Hills','Citrus Springs'],'Hernando County':['Spring Hill','Weeki Wachee'],'St. Lucie County':['Port Saint Lucie','Lakewood Park'],'Okeechobee County':['Okeechobee']}};}function renderTree(){const t=document.getElementById('tree');t.innerHTML=Object.entries(S.markets).map(([st,cs])=>'<div class="ts"><div class="tsl">🇺🇸 '+st+'</div>'+Object.entries(cs).map(([co,ms])=>'<div class="tc"><div class="tcl">📂 '+co+'</div><div class="tsb">'+ms.map(m=>{const ia=S.active&&S.active.s===st&&S.active.c===co&&S.active.m===m;const pills=['s','c','i','r'].map(tp=>{const k=key(st,co,m,tp==='s'?'sellers':tp==='c'?'corp':tp==='i'?'indv':'realtors');return'<span class="tp '+tp+'" style="'+(S.data[k]&&S.data[k].length?'':'opacity:.2')+'"></span>';}).join('');return'<div class="tsi '+(ia?'active':'')+'" onclick="selMkt(''+st+'',''+co+'',''+m.replace(/'/g,"\'")+'')" ><span class="tsn">'+m+'</span><span class="tps">'+pills+'</span></div>';}).join('')+'</div></div>').join('')+'</div>').join('');} function selMkt(s,c,m){S.active={s,c,m};S.page=0;S.search='';S.filter='all';document.getElementById('bc').innerHTML=s+' <span>›</span> '+c+' <span>›</span> '+m;renderContent();renderTree();}function switchTab(t,el){S.tab=t;S.page=0;S.search='';S.filter='all';document.querySelectorAll('.lt').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderContent();}function renderContent(){const lc=document.getElementById('lc');if(!S.active){lc.innerHTML='<div class="es"><div class="ei">📍</div><div class="et">Select a market</div></div>';return;}const k=aKey();const rows=S.data[k]||[];if(!rows.length){lc.innerHTML=uzHTML();return;}renderTable(rows);}function uzHTML(){const labs={sellers:'Sellers CSV (PropStream export)',corp:'Corporate Buyers XLSX',indv:'Individual Buyers XLSX',realtors:'Realtors CSV'};return'<div class="uzone" id="dz" ondragover="hDrag(event)" ondragleave="hDL(event)" ondrop="hDrop(event)"><input type="file" id="fi" accept=".csv,.xlsx,.xls" onchange="hFile(event)"><div class="ui">📂</div><div class="ut">Drop file or click to upload</div><div class="us">'+(labs[S.tab]||'CSV or XLSX')+'</div></div>';}function hDrag(e){e.preventDefault();document.getElementById('dz').classList.add('over');}function hDL(e){document.getElementById('dz').classList.remove('over');}function hDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('over');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);}function hFile(e){if(e.target.files[0])processFile(e.target.files[0]);}function processFile(f){const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{defval:''});if(!rows.length){toast('No data found');return;}const k=aKey();S.data[k]=parseRows(rows);S.page=0;S.search='';S.filter='all';renderTree();renderContent();toast('Loaded '+S.data[k].length+' records');}catch(err){toast('Error: '+err.message);}};r.readAsBinaryString(f);}function col(ks,...ns){const l=ns.map(n=>n.toLowerCase());return ks.find(k=>l.some(n=>k.toLowerCase().includes(n)))||ks[0];}function parseRows(rows){const ks=Object.keys(rows[0]);if(S.tab==='sellers')return parseSellers(rows,ks);if(S.tab==='corp'||S.tab==='indv')return parseBuyers(rows,ks);return parseRealtors(rows,ks);}function parseSellers(rows,ks){const fn=col(ks,'owner 1 first','first name','first');const ln=col(ks,'owner 1 last','last name','owner name','last');const ad=col(ks,'address','property address','site address');const em=col(ks,'email 1','email');const ph=col(ks,'phone 1','phone');const lt=col(ks,'lot size','lot sqft','sq ft','acres');const ap=col(ks,'apn','parcel');return rows.map((r,i)=>{const name=((r[fn]||'').trim()+' '+(r[ln]||'').trim()).trim()||'Unknown';const email=(r[em]||'').trim();const phone=(r[ph]||'').trim();const score=Math.min(40+(email?25:0)+(phone?20:0)+(parseFloat((r[lt]||'0').toString().replace(/[^0-9.]/g,''))>0.5?10:0),100);return{id:i,name,address:(r[ad]||'').trim(),email,phone,lot:(r[lt]||'').toString().trim(),apn:(r[ap]||'').trim(),score};}).filter(r=>r.name!=='Unknown');}function parseBuyers(rows,ks){const nm=col(ks,'owner 1','company','buyer','name');const ct=col(ks,'mailing city','city');const st=col(ks,'mailing state','state');const map={};rows.forEach(r=>{const name=(r[nm]||'').trim();if(!name)return;const city=(r[ct]||'').trim();const k2=name+'|'+city;if(!map[k2])map[k2]={name,city,state:(r[st]||'').trim(),buys:0};map[k2].buys++;});return Object.values(map).sort((a,b)=>b.buys-a.buys).map((r,i)=>({...r,id:i}));}function parseRealtors(rows,ks){const nm=col(ks,'agent name','name','full name');const br=col(ks,'brokerage','office','company');const ph=col(ks,'phone','agent phone');const em=col(ks,'email','agent email');return rows.map((r,i)=>({id:i,name:(r[nm]||'').trim()||'Unknown',brokerage:(r[br]||'').trim(),phone:(r[ph]||'').trim(),email:(r[em]||'').trim()})).filter(r=>r.name!=='Unknown');}function renderTable(all){let rows=[...all];if(S.search){const q=S.search.toLowerCase();rows=rows.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(q)));}if(S.tab==='sellers'){if(S.filter==='email')rows=rows.filter(r=>r.email);if(S.filter==='noemail')rows=rows.filter(r=>!r.email);if(S.filter==='phone')rows=rows.filter(r=>r.phone);}if(S.sort.col){rows.sort((a,b)=>{const av=a[S.sort.col]||'',bv=b[S.sort.col]||'';const n=parseFloat(av)-parseFloat(bv);const res=isNaN(n)?String(av).localeCompare(String(bv)):n;return S.sort.dir==='asc'?res:-res;});}const total=rows.length;const start=S.page*PS;const pr=rows.slice(start,start+PS);const k=aKey();let h='<div class="sgrid">'+statsHTML(all)+'</div>';h+='<div class="ctrls">'+ctrlsHTML()+'</div>';h+='<table class="dt"><thead><tr>'+hdrs()+'</tr></thead><tbody>'+pr.map(r=>rowHTML(r,k)).join('')+'</tbody></table>';h+=pgHTML(total,start);document.getElementById('lc').innerHTML=h;}function statsHTML(rows){if(S.tab==='sellers'){const we=rows.filter(r=>r.email).length;const wp=rows.filter(r=>r.phone).length;const avg=rows.length?Math.round(rows.reduce((s,r)=>s+r.score,0)/rows.length):0;return[{v:rows.length.toLocaleString(),l:'Total',c:'var(--text)'},{v:we.toLocaleString(),l:'Has Email',c:'var(--green)'},{v:wp.toLocaleString(),l:'Has Phone',c:'var(--blue)'},{v:avg+'%',l:'Avg Score',c:'var(--amber)'}].map(s=>'<div class="sbox"><div class="sv" style="color:'+s.c+'">'+s.v+'</div><div class="sl">'+s.l+'</div></div>').join('');}if(S.tab==='corp'||S.tab==='indv'){return'<div class="sbox"><div class="sv">'+rows.length+'</div><div class="sl">Total Buyers</div></div><div class="sbox"><div class="sv" style="color:var(--blue)">'+(rows[0]&&rows[0].buys||0)+'</div><div class="sl">Top Buyer Buys</div></div>';}return'<div class="sbox"><div class="sv">'+rows.length+'</div><div class="sl">Realtors</div></div>';}function ctrlsHTML(){const fs={sellers:[{v:'all',l:'All'},{v:'email',l:'Has Email'},{v:'noemail',l:'No Email'},{v:'phone',l:'Has Phone'}],corp:[{v:'all',l:'All'}],indv:[{v:'all',l:'All'}],realtors:[{v:'all',l:'All'}]};const btns=(fs[S.tab]||[]).map(f=>'<button class="fb '+(S.filter===f.v?'on':'')+'" onclick="setF(''+f.v+'')">'+f.l+'</button>').join('');return'<input class="si" placeholder="Search..." value="'+S.search+'" oninput="doSearch(this.value)">'+btns+'<button class="eb" onclick="exportGHL()">Export GHL CSV</button>';}function hdrs(){const s=(c,l)=>{const a=S.sort.col===c?(S.sort.dir==='asc'?'↑':'↓'):'';return'<th onclick="doSort(''+c+'')">'+l+' '+a+'</th>';};if(S.tab==='sellers')return[s('name','Name'),s('address','Address'),s('email','Email'),s('phone','Phone'),s('score','Score'),'<th>Status</th>','<th>Notes</th>'].join('');if(S.tab==='corp'||S.tab==='indv')return[s('name','Buyer/Company'),s('city','City'),s('state','St'),s('buys','Buys'),'<th>Status</th>','<th>Notes</th>'].join('');return[s('name','Agent'),s('brokerage','Brokerage'),s('phone','Phone'),s('email','Email'),'<th>Status</th>','<th>Notes</th>'].join('');}function rowHTML(r,k){const st=S.statuses[k+'|'+r.id]||'New';const note=S.notes[k+'|'+r.id]||'';const sc={'New':'','Contacted':'rgba(91,156,245,.15)','Interested':'rgba(111,207,98,.15)','Sent':'rgba(245,166,35,.15)','Dead':'rgba(240,71,71,.15)'};const sb='<button class="sp" style="background:'+(sc[st]||'')+';color:var(--muted)" onclick="cycleS(''+k+'',''+r.id+'')">'+st+'</button>';const ni='<input class="ni" value="'+note+'" placeholder="Note…" onchange="saveNote(''+k+'',''+r.id+'',this.value)">';if(S.tab==='sellers'){const sc2=r.score>=70?'var(--green)':r.score>=50?'var(--amber)':'var(--red)';return'<tr><td>'+r.name+'</td><td style="color:var(--muted);font-size:11px">'+(r.address||'—')+'</td><td style="font-size:11px">'+(r.email||'<span style="color:var(--dim)">—</span>')+'</td><td style="font-size:11px">'+(r.phone||'<span style="color:var(--dim)">—</span>')+'</td><td><span class="sb2"><span class="sf" style="width:'+r.score+'%;background:'+sc2+'"></span></span><span style="font-size:11px;font-family:'DM Mono',monospace;color:'+sc2+'">'+r.score+'</span></td><td>'+sb+'</td><td>'+ni+'</td></tr>';}if(S.tab==='corp'||S.tab==='indv'){return'<tr><td style="font-weight:600">'+r.name+'</td><td style="color:var(--muted)">'+(r.city||'—')+'</td><td style="color:var(--muted)">'+(r.state||'—')+'</td><td style="font-family:'DM Mono',monospace;color:var(--blue)">'+r.buys+'</td><td>'+sb+'</td><td>'+ni+'</td></tr>';}return'<tr><td style="font-weight:600">'+r.name+'</td><td style="color:var(--muted)">'+(r.brokerage||'—')+'</td><td style="font-size:11px">'+(r.phone||'—')+'</td><td style="font-size:11px">'+(r.email||'—')+'</td><td>'+sb+'</td><td>'+ni+'</td></tr>';}function pgHTML(total,start){const tp=Math.ceil(total/PS);if(tp<=1)return'<div class="pg"><span class="pi">'+total+' records</span></div>';const pgs=Array.from({length:Math.min(tp,7)},(_,i)=>'<button class="pb '+(i===S.page?'on':'')+'" onclick="goPage('+i+')">'+( i+1)+'</button>').join('');return'<div class="pg"><span class="pi">'+(start+1)+'–'+Math.min(start+PS,total)+' of '+total+'</span><div class="pbs"><button class="pb" onclick="goPage('+(S.page-1)+')" '+(S.page===0?'disabled':'')+'>‹</button>'+pgs+'<button class="pb" onclick="goPage('+(S.page+1)+')" '+(S.page>=tp-1?'disabled':'')+'>›</button></div></div>';}function goPage(p){S.page=p;renderContent();}function doSearch(v){S.search=v;S.page=0;renderContent();}function setF(f){S.filter=f;S.page=0;renderContent();}function doSort(c){if(S.sort.col===c)S.sort.dir=S.sort.dir==='asc'?'desc':'asc';else{S.sort.col=c;S.sort.dir='desc';}renderContent();}const sts=['New','Contacted','Interested','Sent','Dead'];function cycleS(k,id){const sk=k+'|'+id;const cur=S.statuses[sk]||'New';S.statuses[sk]=sts[(sts.indexOf(cur)+1)%sts.length];renderContent();}function saveNote(k,id,v){S.notes[k+'|'+id]=v;}function exportGHL(){const k=aKey();const rows=S.data[k]||[];if(!rows.length){toast('No data to export');return;}const mkt=S.active.m;let csv='First Name,Last Name,Email,Phone 1,Tags
